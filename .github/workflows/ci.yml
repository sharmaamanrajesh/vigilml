name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check vigilml/ tests/

      - name: Type check (mypy)
        run: mypy vigilml/

      - name: Unit tests
        run: pytest tests/unit/ -v --cov=vigilml --cov-report=xml -m "not integration"

      - name: Integration tests
        run: pytest tests/integration/ -v -m integration
        env:
          VIGILML_TEST_MODE: "1"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
        if: matrix.python-version == '3.11'

  agent-tests:
    name: Agent tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run all agents
        run: python tests/agents/run_all_agents.py

  security-self-scan:
    name: VigilML scans itself
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install VigilML
        run: pip install -e .

      - name: Self-scan
        run: |
          vigilml scan . --no-colour
          echo "Exit code: $?"
